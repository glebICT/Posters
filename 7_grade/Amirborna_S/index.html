<html>
<head>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #111;
        }

        section {
            display: flex;
            align-items: center;
            gap: 30px;
            width: 1000px;
            height: 500px;
            background: rgb(44, 0, 0);
            padding: 20px;
        }

        img {
            width: 400px;
            height: auto;
            border-radius: 10px;
        }

        blockquote {
            color: #fff;
            font-size: 40px;
        }

        blockquote::after {
            display: block;
            font-size: 20px;
            margin-top: 10px;
            content: attr(cite);
            color: #ccc;
        }
    </style>
</head>

<body>
    <section>
        <!-- Add your image here -->
        <img src="madrid.jpg" alt="Madrid">

        <blockquote cite="By Bernabau">
            "Are you coming to Madrid?"
        </blockquote>
    </section>
</body>
</html>
