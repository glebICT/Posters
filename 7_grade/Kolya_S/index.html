<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vibe Page</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #a1c4fd, #c2e9fb);
    font-family: Arial, sans-serif;
  }

  .card {
    width: 520px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    overflow: hidden;
    text-align: center;
  }

  .image {
    height: 300px;
  }

  .image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .content {
    padding: 25px;
  }

  h1 {
    margin: 0;
    font-size: 34px;
    color: #222;
  }

  p {
    margin-top: 10px;
    color: #555;
    font-size: 15px;
    line-height: 1.5;
  }
</style>
</head>

<body>

<div class="card">
  <div class="image">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="nature">
  </div>

  <div class="content">
    <h1>Stay in the Flow</h1>
    <p>Simple things, quiet mind, good energy. Just keep moving forward.</p>
  </div>
</div>

</body>
</html>
