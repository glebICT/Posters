<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Картинка</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">

    <style>
        /* --- НАСТРОЙКИ ЦВЕТОВ --- */
        :root {
            --bg-color: #f0f2f5;    /* Цвет фона страницы */
            --text-color: #333333;  /* Цвет текста */
            --card-bg: #ffffff;    /* Цвет фона карточки (если нужно) */
            --font-size: 2rem;      /* Размер шрифта */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Caveat', cursive; /* Применяем рукописный шрифт */
            color: var(--text-color);
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .container img {
            max-width: 100%;
            height: auto;
            border-radius: 15px; /* Скругление углов картинки */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); /* Легкая тень */
        }

        .caption {
            margin-top: 20px;
            font-size: var(--font-size);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="image.png" alt="Описание изображения">
        
        <div class="caption">Люди пешки, О, орешки</div>
    </div>

</body>
</html>
