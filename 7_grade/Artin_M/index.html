<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Eggchan</title>
<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #dcdcdc;
}

/* Grid */
.pixel-art {
    display: grid;
    grid-template-columns: repeat(8, 50px);
    grid-template-rows: repeat(8, 50px);
    image-rendering: pixelated;
}

/* Pixel */
.pixel {
    width: 50px;
    height: 50px;
}

/* 🎨 Minecraft-style palette */
.blue-light { background: #4db8ff; }
.blue-mid { background: #2f8fe6; }
.blue-dark { background: #1c5fa8; }
.blue-deep { background: #0f3f73; }

.black { background: #000000; }

.highlight { background: #e6f2ff; } /* shine */
.gray { background: #b8b8b8; }
.light { background: #eaeaea; }
.pink { background: #e8a6a6; }
.white { background: #ffffff; }
</style>
</head>

<body>
<div class="pixel-art">

<!-- Row 1 -->
<div class="pixel pink"></div>
<div class="pixel gray"></div>
<div class="pixel light"></div>
<div class="pixel gray"></div>
<div class="pixel light"></div>
<div class="pixel pink"></div>
<div class="pixel light"></div>
<div class="pixel light"></div>

<!-- Row 2 (top lighting) -->
<div class="pixel light"></div>
<div class="pixel blue-light"></div>
<div class="pixel blue-mid"></div>
<div class="pixel blue-mid"></div>
<div class="pixel blue-mid"></div>
<div class="pixel blue-mid"></div>
<div class="pixel blue-light"></div>
<div class="pixel light"></div>

<!-- Row 3 -->
<div class="pixel pink"></div>
<div class="pixel blue-mid"></div>
<div class="pixel black"></div>
<div class="pixel black"></div>
<div class="pixel black"></div>
<div class="pixel highlight"></div> <!-- shiny pixel -->
<div class="pixel blue-light"></div>
<div class="pixel pink"></div>

<!-- Row 4 -->
<div class="pixel light"></div>
<div class="pixel blue-mid"></div>
<div class="pixel black"></div>
<div class="pixel black"></div>
<div class="pixel black"></div>
<div class="pixel black"></div>
<div class="pixel blue-light"></div>
<div class="pixel light"></div>

<!-- Row 5 -->
<div class="pixel light"></div>
<div class="pixel blue-dark"></div>
<div class="pixel black"></div>
<div class="pixel black"></div>
<div class="pixel black"></div>
<div class="pixel black"></div>
<div class="pixel blue-mid"></div>
<div class="pixel light"></div>

<!-- Row 6 (darker bottom) -->
<div class="pixel pink"></div>
<div class="pixel blue-dark"></div>
<div class="pixel black"></div>
<div class="pixel black"></div>
<div class="pixel black"></div>
<div class="pixel black"></div>
<div class="pixel blue-mid"></div>
<div class="pixel pink"></div>

<!-- Row 7 -->
<div class="pixel light"></div>
<div class="pixel blue-deep"></div>
<div class="pixel blue-dark"></div>
<div class="pixel blue-dark"></div>
<div class="pixel blue-dark"></div>
<div class="pixel blue-dark"></div>
<div class="pixel blue-mid"></div>
<div class="pixel light"></div>

<!-- Row 8 -->
<div class="pixel gray"></div>
<div class="pixel light"></div>
<div class="pixel light"></div>
<div class="pixel pink"></div>
<div class="pixel light"></div>
<div class="pixel light"></div>
<div class="pixel gray"></div>
<div class="pixel light"></div>

</div>
</body>
</html>

<h1> My eye sees all </h1>
