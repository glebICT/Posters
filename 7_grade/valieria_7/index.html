  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+IN+Guides&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
        body{
          margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .poster {
            text-align: center;
            border: 3px solid rgb(248, 5, 5);
            padding: 40px;
            border-radius: 15px;
            background: rgba(0,0,0,0.4);
            max-width: 500px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffd700;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 16px;
            background: #ffd700;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:hover {
            background: #ffcc00;
        }
    </style>
</head>
<body>

<div class="poster">
    <h1>fun</h1>
    <h2>30 march</h2>
    <p>One step closer</p>
    <button class="btn"></button>
</div>

</body>
</html>
