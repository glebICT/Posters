<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Летний Кемпинг</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#87ceeb;
}

.poster{
    width:700px;
    margin:30px auto;
    background:#fff8dc;
    border:6px solid green;
    padding:20px;
    text-align:center;
}

h1{
    color:darkgreen;
    font-size:50px;
}

img{
    width:100%;
    border:3px solid orange;
}

.text{
    font-size:22px;
    margin-top:20px;
    color:#333;
}

.info{
    margin-top:20px;
    background:lightyellow;
    padding:15px;
    border:2px dashed orange;
    font-size:20px;
}

button{
    margin-top:25px;
    padding:12px 25px;
    font-size:20px;
    background:orange;
    border:none;
    cursor:pointer;
}

button:hover{
    background:gold;
}
</style>
</head>

<body>

<div class="poster">

    <h1>ЛЕТНИЙ КЕМПИНГ</h1>

    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop" alt="Кемпинг">

    <div class="text">
        Приезжай в наш летний лагерь!
        Палатки, костёр, походы и весёлые игры ждут тебя!
    </div>

    <div class="info">
        📍 Место: Лесной парк <br>
        📅 Дата: Июль 2026 <br>
        ⛺ Друзья и приключения гарантированы!
    </div>

    <button>Записаться</button>

</div>

</body>
</html>
